<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard - LITHIK BEVERAGE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* CSS Variables for Auto Dark/Light Mode[span_1](start_span)[span_1](end_span) */
        :root {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary-color: #1e40af; 
            --focus-ring: rgba(30, 64, 175, 0.2);
            --border-color: #e2e8f0;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #020617;
                --surface-color: #0f172a;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --primary-color: #2563eb; 
                --focus-ring: rgba(37, 99, 235, 0.25);
                --border-color: #1e293b;
                --danger-color: #f87171;
                --danger-hover: #ef4444;
            }
        }

        /* Strict Layout Rules: No copy[span_2](start_span)[span_2](end_span) */
        * {
            box-sizing: border-box;
            -webkit-user-select: none; 
            -moz-user-select: none;    
            -ms-user-select: none;     
            user-select: none;         
            -webkit-tap-highlight-color: transparent; 
        }

        /* Aggressively Hide All Scrollbars Everywhere[span_3](start_span)[span_3](end_span) */
        html, body, * {
            -ms-overflow-style: none !important;  
            scrollbar-width: none !important;  
        }
        
        *::-webkit-scrollbar {
            display: none !important;
            width: 0 !important;
            height: 0 !important;
            background: transparent !important;
            -webkit-appearance: none !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            width: 100vw;
            overflow-y: auto;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Header UI */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            width: auto;
            box-shadow: none;
        }

        .back-btn:hover {
            background-color: var(--bg-color);
            transform: none;
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--primary-color);
            margin: 0;
            display: none;
        }

        .user-profile-badge {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-profile-badge img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }

        .user-profile-details {
            display: flex;
            flex-direction: column;
            text-align: right;
        }

        .user-profile-name {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .user-profile-role {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 800;
        }

        /* Main Content Grid */
        .main-content {
            padding: 24px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-header {
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: 800;
        }

        .users-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .user-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .user-card-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-card-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            background-color: var(--bg-color);
        }

        .user-card-text {
            flex: 1;
            overflow: hidden;
        }

        .user-card-name {
            font-size: 1rem;
            font-weight: 600;
            margin: 0 0 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-card-email {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0 0 6px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            background-color: var(--bg-color);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .badge.admin {
            background-color: rgba(30, 64, 175, 0.1);
            color: var(--primary-color);
            border-color: var(--primary-color);
        }

        /* Buttons & Inputs[span_4](start_span)[span_4](end_span) */
        button {
            width: 100%;
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .edit-btn {
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px;
            box-shadow: none;
        }

        .edit-btn:hover {
            background-color: var(--border-color);
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            padding: 16px;
            background-color: var(--surface-color);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .pagination button {
            width: auto;
            padding: 10px 20px;
            box-shadow: none;
        }

        /* Edit Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: flex-end; /* Slide up on mobile */
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--surface-color);
            width: 100%;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            margin-bottom: 24px;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        input {
            width: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 2px solid var(--border-color);
            padding: 16px;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            margin-bottom: 20px;
            -webkit-user-select: auto;
            user-select: auto;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px var(--focus-ring);
        }

        /* Toggle Switch */
        .toggle-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background-color: var(--bg-color);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .toggle-label {
            font-weight: 600;
            font-size: 1rem;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--text-muted);
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary-color);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        .modal-actions {
            display: flex;
            justify-content: space-between;
            gap: 16px;
        }

        .delete-btn {
            background-color: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            flex: 1;
        }

        .delete-btn:hover:not(:disabled) {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger-hover);
        }

        .save-btn {
            flex: 2;
        }

        /* Loading Spinner CSS[span_5](start_span)[span_5](end_span) */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #ffffff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-container {
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .loader-container .spinner {
            display: block;
            border-color: var(--border-color);
            border-top-color: var(--primary-color);
            width: 40px;
            height: 40px;
        }

        /* PC / Desktop Layout Adjustments[span_6](start_span)[span_6](end_span) */
        @media (min-width: 768px) {
            .header-title {
                display: block;
            }
            .users-grid {
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            }
            .modal-overlay {
                align-items: center;
            }
            .modal-content {
                max-width: 450px;
                border-radius: 20px;
                transform: scale(0.95);
            }
            .modal-overlay.active .modal-content {
                transform: scale(1);
            }
        }
        
        /* ================= NEW ADDITIONS FOR FIXES & SKELETONS ================= */
        
        /* Skeleton Loading CSS */
        @keyframes skeleton-loading {
            0% { background-color: var(--border-color); }
            100% { background-color: var(--bg-color); }
        }
        .skeleton {
            animation: skeleton-loading 1s linear infinite alternate;
            border-radius: 4px;
        }
        .skeleton-img {
            width: 50px; 
            height: 50px; 
            border-radius: 50%;
        }
        .skeleton-text {
            height: 12px;
            margin-bottom: 8px;
            width: 80%;
        }
        .skeleton-text.short { 
            width: 50%; 
        }

        /* Edit Modal Button Scrolling Fix */
        .modal-content {
            display: flex;
            flex-direction: column;
            padding: 24px 24px 0 24px; /* Shift bottom padding to actions */
        }
        
        .modal-header, .toggle-container, input {
            flex-shrink: 0;
        }

        .modal-actions {
            position: sticky;
            bottom: 0;
            background-color: var(--surface-color);
            padding: 16px 0 24px 0;
            margin-top: 10px;
            border-top: 1px solid var(--border-color);
            z-index: 10;
        }

        /* Hide Old Pagination Buttons since Infinite Scroll is active */
        #pagination-controls {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="admin-header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()">← Back</button>
            <h1 class="header-title">Admin Console</h1>
        </div>
        <div class="user-profile-badge" id="current-user-badge">
            <div class="user-profile-details">
                <span class="user-profile-name" id="current-user-name"><div class="skeleton skeleton-text short" style="margin:0;"></div></span>
                <span class="user-profile-role" id="current-user-role">...</span>
            </div>
            <!-- Added onerror to handle broken profile images globally -->
            <img id="current-user-pic" src="https://via.placeholder.com/90" alt="Profile" onerror="this.onerror=null; this.src='https://via.placeholder.com/90'">
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <h2 class="section-header">User Management</h2>
        
        <div id="loader" class="loader-container" style="display:none;">
            <div class="spinner"></div>
        </div>

        <div id="users-grid" class="users-grid">
            <!-- User cards will be injected here -->
        </div>
        
        <!-- Sentinel for Infinite Scrolling -->
        <div id="scroll-sentinel" style="height: 20px; width: 100%;"></div>

        <div class="pagination" id="pagination-controls" style="display: none;">
            <button id="prev-btn" class="edit-btn" disabled>Previous</button>
            <span id="page-info" style="font-weight: 600; font-size: 0.9rem;">Page 1</span>
            <button id="next-btn" class="edit-btn" disabled>Next</button>
        </div>
    </main>

    <!-- Edit User Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit User</h2>
            </div>
            
            <input type="hidden" id="edit-uid">
            <input type="text" id="edit-name" placeholder="Full Name">
            
            <div class="toggle-container">
                <span class="toggle-label">Administrator Access</span>
                <label class="switch">
                    <input type="checkbox" id="edit-admin-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="modal-actions">
                <button id="delete-user-btn" class="delete-btn">Delete</button>
                <button id="save-user-btn" class="save-btn">
                    <span id="save-btn-text">Save Changes</span>
                    <div id="save-spinner" class="spinner"></div>
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase Scripts[span_7](start_span)[span_7](end_span) -->
    <script type="module">
        import { app, db } from './config.js';
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, deleteDoc, collection, query, limit, getDocs, startAfter, orderBy, endBefore, limitToLast } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const auth = getAuth(app);
        
        // UI Elements
        const usersGrid = document.getElementById('users-grid');
        const loader = document.getElementById('loader');
        const paginationControls = document.getElementById('pagination-controls');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const pageInfo = document.getElementById('page-info');

        // Modal Elements
        const editModal = document.getElementById('edit-modal');
        const editUid = document.getElementById('edit-uid');
        const editName = document.getElementById('edit-name');
        const editAdminToggle = document.getElementById('edit-admin-toggle');
        const deleteUserBtn = document.getElementById('delete-user-btn');
        const saveUserBtn = document.getElementById('save-user-btn');
        const saveSpinner = document.getElementById('save-spinner');
        const saveBtnText = document.getElementById('save-btn-text');

        // Pagination State
        const PAGE_LIMIT = 10;
        let currentPage = 1;
        let documentSnapshots = [];
        let pageCursors = [null]; // Stores the first document of each page for prev navigation
        
        // Infinite Scrolling State variables
        let isFetching = false;
        let hasMore = true;
        
        // Haptic Feedback Helper[span_8](start_span)[span_8](end_span)
        function hapticVibrate(pattern) {
            if ('vibrate' in navigator) {
                navigator.vibrate(pattern);
            }
        }

        // Initialize Admin Auth State
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDocRef = doc(db, "users", user.uid);
                const userDocSnap = await getDoc(userDocRef);
                
                document.getElementById('current-user-pic').src = user.photoURL || 'https://via.placeholder.com/90';
                
                if (userDocSnap.exists()) {
                    const userData = userDocSnap.data();
                    document.getElementById('current-user-name').innerText = userData.name || user.displayName;
                    document.getElementById('current-user-role').innerText = (userData.role === 'admin' || userData.admin === true) ? 'Administrator' : 'User';
                    
                    // Proceed to load users
                    loadUsers('init');
                }
            } else {
                window.location.href = 'login.html';
            }
        });

        // Load Users (Firebase Read Optimization & Infinite Scroll Integration)
        async function loadUsers(direction = 'init') {
            if (isFetching || (!hasMore && direction === 'next')) return;
            isFetching = true;
            
            // loader.style.display = 'flex'; // Modified logic below preserves intention while adding skeletons
            
            if (direction === 'init') {
                hasMore = true;
                // Add Skeleton cards before data loads
                usersGrid.innerHTML = '';
                for(let i=0; i<6; i++) {
                    usersGrid.innerHTML += `
                    <div class="user-card skeleton-card">
                        <div class="user-card-info">
                            <div class="skeleton skeleton-img"></div>
                            <div class="user-card-text" style="width:100%">
                                <div class="skeleton skeleton-text"></div>
                                <div class="skeleton skeleton-text short"></div>
                            </div>
                        </div>
                    </div>`;
                }
                usersGrid.style.display = 'grid';
                documentSnapshots = [];
            } else if (direction === 'next') {
                loader.style.display = 'flex'; // Show spinner at bottom when scrolling
            }

            try {
                const usersRef = collection(db, "users");
                let q;

                if (direction === 'next') {
                    const lastVisible = documentSnapshots[documentSnapshots.length - 1];
                    q = query(usersRef, orderBy("createdAt", "desc"), startAfter(lastVisible), limit(PAGE_LIMIT));
                    currentPage++;
                } else if (direction === 'prev') {
                    const firstVisibleOfCurrentPage = documentSnapshots[0];
                    q = query(usersRef, orderBy("createdAt", "desc"), endBefore(firstVisibleOfCurrentPage), limitToLast(PAGE_LIMIT));
                    currentPage--;
                } else {
                    // Init or Refresh
                    q = query(usersRef, orderBy("createdAt", "desc"), limit(PAGE_LIMIT));
                    currentPage = 1;
                    pageCursors = [null];
                }

                const querySnapshot = await getDocs(q);
                
                if (direction === 'init' || direction === 'prev') {
                    usersGrid.innerHTML = ''; // Clear skeletons or old page
                    documentSnapshots = querySnapshot.docs;
                } else if (direction === 'next') {
                    documentSnapshots = [...documentSnapshots, ...querySnapshot.docs];
                }

                if (!querySnapshot.empty) {
                    querySnapshot.forEach((docSnap) => {
                        renderUserCard(docSnap.data(), docSnap.id);
                    });

                    // Manage Pagination UI
                    pageInfo.innerText = `Page ${currentPage}`;
                    prevBtn.disabled = currentPage === 1;
                    nextBtn.disabled = querySnapshot.docs.length < PAGE_LIMIT;
                    
                    // paginationControls.style.display = 'flex'; // overridden by css !important
                    
                    // Logic for infinite scroll ending
                    if (querySnapshot.docs.length < PAGE_LIMIT) {
                        hasMore = false;
                    }
                } else if (direction === 'init') {
                    usersGrid.innerHTML = '<p style="text-align: center; color: var(--text-muted);">No users found.</p>';
                    paginationControls.style.display = 'none';
                    hasMore = false;
                } else if (direction === 'next') {
                    hasMore = false;
                }

                loader.style.display = 'none';
                usersGrid.style.display = 'grid';

            } catch (error) {
                console.error("Error fetching users:", error);
                // alert("Failed to load users. Check permissions or indexes."); // Commented out to suppress the requested error alert
                loader.style.display = 'none';
            } finally {
                isFetching = false;
            }
        }

        prevBtn.addEventListener('click', () => {
            hapticVibrate(50);
            loadUsers('prev');
        });

        nextBtn.addEventListener('click', () => {
            hapticVibrate(50);
            loadUsers('next');
        });
        
        // Infinite Scroll Intersection Observer Implementation
        const scrollObserver = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                loadUsers('next');
            }
        }, { rootMargin: '200px' });

        // Bind observer to sentinel
        setTimeout(() => {
            const sentinel = document.getElementById('scroll-sentinel');
            if (sentinel) {
                scrollObserver.observe(sentinel);
            }
        }, 1000);

        // Render User Card
        function renderUserCard(userData, docId) {
            const isAdmin = userData.role === 'admin' || userData.admin === true;
            
            const card = document.createElement('div');
            card.className = 'user-card';
            
            card.innerHTML = `
                <div class="user-card-info">
                    <!-- Added onerror attribute to ensure no broken images in grid cards -->
                    <img src="${userData.photoURL || 'https://via.placeholder.com/90'}" class="user-card-img" alt="Profile" onerror="this.onerror=null; this.src='https://via.placeholder.com/90'">
                    <div class="user-card-text">
                        <h3 class="user-card-name">${userData.name || 'Unknown User'}</h3>
                        <p class="user-card-email">${userData.email || 'No email'}</p>
                        <span class="badge ${isAdmin ? 'admin' : ''}">${isAdmin ? 'Admin' : 'User'}</span>
                    </div>
                </div>
                <button class="edit-btn" onclick="window.openEditModal('${docId}', '${userData.name?.replace(/'/g, "\\'") || ''}', ${isAdmin})">
                    Edit Profile
                </button>
            `;
            
            usersGrid.appendChild(card);
        }

        // Modal Logic (Mobile Back Button Support)
        window.openEditModal = (uid, name, isAdmin) => {
            hapticVibrate(50);
            editUid.value = uid;
            editName.value = name;
            editAdminToggle.checked = isAdmin;
            
            editModal.classList.add('active');
            
            // Push state for mobile back button intercept
            history.pushState({ modalOpen: true }, 'Edit User');
        };

        const closeModal = () => {
            editModal.classList.remove('active');
        };

        // Listen for mobile back button
        window.addEventListener('popstate', (event) => {
            if (editModal.classList.contains('active')) {
                closeModal();
            }
        });

        // Close on background click
        editModal.addEventListener('click', (e) => {
            if (e.target === editModal) {
                history.back(); // Triggers popstate
            }
        });

        // Save User
        saveUserBtn.addEventListener('click', async () => {
            hapticVibrate(50);
            const targetUid = editUid.value;
            const newName = editName.value.trim();
            const setAdmin = editAdminToggle.checked;

            if (!newName) {
                hapticVibrate([50, 100, 50]);
                alert("Name cannot be empty.");
                return;
            }

            try {
                saveUserBtn.disabled = true;
                saveSpinner.style.display = 'block';
                saveBtnText.innerText = "Saving...";

                const userRef = doc(db, "users", targetUid);
                await updateDoc(userRef, {
                    name: newName,
                    admin: setAdmin,
                    role: setAdmin ? 'admin' : 'pending'
                });

                hapticVibrate([30, 50, 30]);
                history.back(); // Close modal
                loadUsers('init'); // Refresh current view
                
            } catch (error) {
                console.error("Error updating user:", error);
                hapticVibrate([50, 100, 50]);
                alert("Failed to update user.");
            } finally {
                saveUserBtn.disabled = false;
                saveSpinner.style.display = 'none';
                saveBtnText.innerText = "Save Changes";
            }
        });

        // Delete User
        deleteUserBtn.addEventListener('click', async () => {
            hapticVibrate([50, 100, 50]);
            if (!confirm("Are you sure you want to completely remove this user? This cannot be undone.")) return;

            const targetUid = editUid.value;
            deleteUserBtn.disabled = true;

            try {
                await deleteDoc(doc(db, "users", targetUid));
                hapticVibrate([30, 50, 30]);
                history.back(); // Close modal
                loadUsers('init'); // Refresh list
            } catch (error) {
                console.error("Error deleting user:", error);
                alert("Failed to delete user. Check permissions.");
            } finally {
                deleteUserBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
