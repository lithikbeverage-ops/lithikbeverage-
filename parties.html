<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Parties & Pending Files - LITHIK BEVERAGE</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a">
    <link rel="apple-touch-icon" href="images/icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Shared Core Theme - Updated for Professional/Tally-like Accounting feel */
        :root {
            --bg-body: #eef2f6; /* Professional crisp background */
            --bg-surface: #ffffff;
            --bg-nav: #ffffff;
            --text-main: #111827; /* Deeper contrast for readability */
            --text-muted: #4b5563;
            --primary-color: #0d47a1; /* Professional Navy Blue */
            --accent-color: #0284c7;
            --success-color: #059669; /* Ledger green */
            --warning-color: #d97706;
            --danger-color: #dc2626;
            --border-color: #cbd5e1; /* Clearer borders for grid-like feel */
            --input-bg: #f8fafc;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --skeleton-base: #e2e8f0;
            --skeleton-shine: #f8fafc;
            /* Sharper borders for an ERP/Accounting look */
            --border-radius-sm: 4px;
            --border-radius-md: 6px;
            --border-radius-lg: 8px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #0f172a;
                --bg-surface: #1e293b;
                --bg-nav: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --primary-color: #3b82f6;
                --accent-color: #38bdf8;
                --border-color: #334155;
                --input-bg: #0f172a;
                --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
                --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
                --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
                --skeleton-base: #1e293b;
                --skeleton-shine: #334155;
            }
        }

        /* Reset & Base Layout */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); height: 100%; width: 100vw; overflow: hidden; }
        *::-webkit-scrollbar { display: none !important; }
        * { -ms-overflow-style: none !important; scrollbar-width: none !important; }

        header, .material-symbols-outlined, .nav-item, .btn-primary, .btn-secondary {
            -webkit-user-select: none; user-select: none;
        }

        .material-symbols-outlined { display: inline-flex; align-items: center; justify-content: center; }

        /* Layout Structure */
        #app-shell { display: flex; height: 100%; width: 100%; position: absolute; inset: 0; flex-direction: column; overflow: hidden; }
        
        header { display: flex; align-items: center; justify-content: space-between; background-color: var(--bg-surface); padding: 12px 20px; border-bottom: 2px solid var(--primary-color); z-index: 10; flex-shrink: 0; box-shadow: var(--shadow-sm); }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        
        .company-logo { width: 40px; height: 40px; border-radius: var(--border-radius-sm); object-fit: cover; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); }
        h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: 0.5px; color: var(--primary-color); margin:0; text-transform: uppercase; }
        
        /* Pending Filter Toggle */
        .filter-toggle { display: flex; align-items: center; justify-content: center; width: 42px; height: 42px; border-radius: var(--border-radius-md); border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-muted); cursor: pointer; transition: all 0.2s; position: relative; }
        .filter-toggle.active { background: rgba(220, 38, 38, 0.1); color: var(--danger-color); border-color: var(--danger-color); }

        .layout-container { display: flex; flex: 1; overflow: hidden; min-height: 0; }
        
        /* Navigation */
        nav.sidebar { display: none; width: 260px; background-color: var(--bg-nav); border-right: 1px solid var(--border-color); flex-direction: column; padding: 20px 0; overflow-y: auto; }
        nav.sidebar .nav-item { display: flex; align-items: center; text-decoration: none; color: var(--text-muted); padding: 14px 24px; gap: 16px; font-size: 0.95rem; font-weight: 600; transition: all 0.2s; cursor: pointer; border-left: 3px solid transparent; }
        nav.sidebar .nav-item:hover, nav.sidebar .nav-item.active { background-color: rgba(13, 71, 161, 0.05); color: var(--primary-color); border-left: 3px solid var(--primary-color); border-right: none; }
        
        nav.bottom-nav { display: flex; background-color: var(--bg-nav); border-top: 1px solid var(--border-color); min-height: 65px; height: calc(65px + env(safe-area-inset-bottom)); width: 100%; overflow-x: auto; overflow-y: hidden; scroll-behavior: smooth; padding: 0 10px; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); position: relative; z-index: 100; }
        nav.bottom-nav .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: var(--text-muted); min-width: 72px; padding: 8px 4px; gap: 4px; font-size: 0.75rem; font-weight: 600; transition: all 0.2s; cursor: pointer; }
        nav.bottom-nav .nav-item.active { color: var(--primary-color); }
        .nav-icon { width: 24px; height: 24px; fill: currentColor; }

        /* Main Scroll Area */
        .main-scroll-area { flex: 1; overflow-y: auto; padding: 20px; background-color: var(--bg-body); position: relative; }
        .container-inner { max-width: 900px; margin: 0 auto; width: 100%; }

        /* Search & Actions */
        .top-actions { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; }
        .search-container { flex: 1; display: flex; align-items: center; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--border-radius-md); padding: 0 16px; transition: all 0.3s ease; box-shadow: var(--shadow-sm); }
        .search-container:focus-within { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(13, 71, 161, 0.15); }
        .search-container input { border: none; background: transparent; width: 100%; padding: 12px 0 12px 12px; color: var(--text-main); font-size: 0.95rem; outline: none; font-family: 'Inter', sans-serif; font-weight: 500; }
        .search-container input::placeholder { color: var(--text-muted); }

        .btn-fab { background: var(--primary-color); color: white; border: none; width: 48px; height: 48px; border-radius: var(--border-radius-md); display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: var(--shadow-md); transition: all 0.2s; flex-shrink: 0; }
        .btn-fab:active { transform: scale(0.95); }

        /* Party List Cards - Tally/ERP Ledger Style */
        .party-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .party-card { background: var(--bg-surface); border: 1px solid var(--border-color); border-left: 4px solid var(--primary-color); border-radius: var(--border-radius-md); padding: 16px; box-shadow: var(--shadow-sm); transition: transform 0.2s, box-shadow 0.2s; position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 12px; }
        .party-card:hover { box-shadow: var(--shadow-md); border-left-color: var(--accent-color); }
        
        .party-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .party-info { flex: 1; padding-right: 12px; }
        .party-type-badge { display: inline-block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; padding: 4px 8px; border-radius: var(--border-radius-sm); margin-bottom: 8px; letter-spacing: 0.5px; }
        .badge-customer { background: rgba(2, 132, 199, 0.1); color: var(--accent-color); border: 1px solid rgba(2, 132, 199, 0.2); }
        .badge-supplier { background: rgba(139, 92, 246, 0.1); color: #8b5cf6; border: 1px solid rgba(139, 92, 246, 0.2); }

        .party-name { font-weight: 700; font-size: 1.1rem; color: var(--text-main); line-height: 1.3; margin-bottom: 6px; text-transform: uppercase; }
        .party-meta { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 6px; margin-bottom: 4px;}
        .party-meta .material-symbols-outlined { font-size: 16px; }
        
        .party-balance-box { text-align: right; min-width: 100px; display: flex; flex-direction: column; align-items: flex-end; background: #fffde7; /* Tally pale yellow vibe */ padding: 10px 12px; border-radius: var(--border-radius-sm); border: 1px solid #e4e4e7; }
        @media (prefers-color-scheme: dark) { .party-balance-box { background: var(--input-bg); border-color: var(--border-color); } }
        .party-bal-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); font-weight: 700; margin-bottom: 4px; }
        .party-bal-val { font-size: 1.2rem; font-weight: 800; color: var(--success-color); line-height: 1; }
        .party-bal-val.pending { color: var(--danger-color); }
        .party-bill-no { font-size: 0.75rem; color: var(--text-main); font-weight: 700; margin-top: 6px; letter-spacing: 0.5px; }
        
        .party-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 10px; margin-top: 2px; }
        .action-group { display: flex; gap: 8px; }
        .btn-card-action { background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-muted); width: 32px; height: 32px; border-radius: var(--border-radius-sm); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .btn-card-action:active { transform: scale(0.9); }
        .btn-call { color: var(--success-color); background: rgba(5, 150, 105, 0.1); border-color: rgba(5, 150, 105, 0.2); width: auto; padding: 0 12px; gap: 6px; font-weight: 700; font-size: 0.85rem;}
        .btn-edit { color: var(--accent-color); background: rgba(2, 132, 199, 0.1); border-color: rgba(2, 132, 199, 0.2); }
        .btn-delete { color: var(--danger-color); background: rgba(220, 38, 38, 0.1); border-color: rgba(220, 38, 38, 0.2); }

        /* Skeletons */
        .skeleton { background: linear-gradient(90deg, var(--skeleton-base) 25%, var(--skeleton-shine) 50%, var(--skeleton-base) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Modals */
        .modal { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background-color: var(--bg-body); z-index: 2000; transition: right 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); overflow-y: auto; padding-bottom: 80px; }
        .modal.active { right: 0; }
        .modal-header { display: flex; align-items: center; gap: 15px; padding: 16px 20px; background: var(--bg-surface); position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--primary-color); justify-content: space-between; box-shadow: var(--shadow-sm);}
        .close-modal { background: none; border: none; color: var(--text-main); cursor: pointer; display: flex; padding: 8px; border-radius: 50%; margin-left: -8px; }
        .modal-header h2 { margin: 0; font-size: 1.15em; font-weight: 700; text-transform: uppercase; }

        /* Mini Popup Modals */
        .mini-modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(15, 23, 42, 0.6); z-index: 4000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; backdrop-filter: blur(4px); }
        .mini-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .mini-modal-content { background: var(--bg-surface); width: 92%; max-width: 400px; border-radius: var(--border-radius-lg); padding: 24px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); transform: scale(0.95); transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid var(--border-color); }
        .mini-modal-overlay.active .mini-modal-content { transform: scale(1); }

        .form-group { padding: 20px; max-width: 800px; margin: 0 auto; }
        .input-wrapper { margin-bottom: 20px; }
        .input-wrapper label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-wrapper input, .input-wrapper select { width: 100%; padding: 12px 14px; border-radius: var(--border-radius-sm); border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); font-size: 0.95rem; font-family: 'Inter', sans-serif; outline: none; transition: all 0.2s ease; font-weight: 500; }
        .input-wrapper input:focus, .input-wrapper select:focus { border-color: var(--primary-color); box-shadow: 0 0 0 2px rgba(13, 71, 161, 0.15); background: var(--bg-surface); }
        .row-inputs { display: flex; gap: 16px; }
        .row-inputs > div { flex: 1; }

        .btn-primary { width: 100%; padding: 14px; border-radius: var(--border-radius-sm); border: none; background: var(--primary-color); color: white; font-size: 1.05em; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: all 0.2s; box-shadow: 0 4px 10px rgba(13, 71, 161, 0.2); text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-primary:active:not(:disabled) { transform: translateY(2px); box-shadow: none; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Toasts */
        .toast-msg { position: fixed; top: 20px; left: 50%; transform: translate(-50%, -20px); color: white; padding: 12px 24px; border-radius: var(--border-radius-sm); z-index: 9999; display: none; font-weight: 600; font-size: 0.95em; align-items: center; gap: 10px; opacity: 0; transition: all 0.3s; box-shadow: var(--shadow-lg); text-transform: uppercase; letter-spacing: 0.5px;}
        .toast-msg.error { background: var(--danger-color); }
        .toast-msg.success { background: var(--success-color); }
        .toast-msg.show { display: flex; opacity: 1; transform: translate(-50%, 0); }

        #scrollLoader { text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.9rem; font-weight: 600; display: none; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; letter-spacing: 0.5px; }

        @media (min-width: 768px) {
            #app-shell { flex-direction: column; }
            .layout-container { flex-direction: row; }
            nav.bottom-nav { display: none; }
            nav.sidebar { display: flex; }
            .party-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="toast-msg error" id="errorToast"><span class="material-symbols-outlined">error</span><span id="errorToastText">Error</span></div>
    <div class="toast-msg success" id="successToast"><span class="material-symbols-outlined">check_circle</span><span id="successToastText">Success</span></div>

    <div id="app-shell">
        <header>
            <div class="header-left">
                <img src="images/icon.png" alt="Logo" class="company-logo" onerror="this.src='https://via.placeholder.com/40'">
                <h1>PARTIES</h1>
            </div>
            <div class="header-right">
                <div class="filter-toggle" id="btnPendingFilter" onclick="vibrateApp(10); togglePendingFilter()" title="Pending Files Filter">
                    <span class="material-symbols-outlined">assignment_late</span>
                </div>
            </div>
        </header>

        <div class="layout-container">
            <nav class="sidebar" id="desktop-nav"></nav>

            <div class="main-scroll-area" id="mainScroll">
                <div class="container-inner">
                    
                    <div class="top-actions">
                        <div class="search-container">
                            <span class="material-symbols-outlined">search</span>
                            <input type="text" id="searchInput" placeholder="Search Party, Bill No..." autocomplete="off">
                        </div>
                        <button class="btn-fab" onclick="openPartyModal()" title="Add Party/Pending File">
                            <span class="material-symbols-outlined">person_add</span>
                        </button>
                    </div>

                    <div class="party-grid" id="partyGrid">
                        <!-- Cards injected via JS -->
                    </div>
                    
                    <div id="scrollLoader">
                        <span class="skeleton" style="width:16px; height:16px; border-radius:50%;"></span> Loading parties...
                    </div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav" id="mobile-nav"></nav>
    </div>

    <!-- ADD/EDIT PARTY MODAL -->
    <div class="modal" id="modalParty">
        <div class="modal-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="close-modal" onclick="history.back()"><span class="material-symbols-outlined">arrow_back</span></button>
                <h2 id="modalPartyTitle">Add Party</h2>
            </div>
        </div>
        
        <div class="form-group">
            <input type="hidden" id="editPartyId">
            
            <div class="input-wrapper">
                <label>Party / Company Name *</label>
                <input type="text" id="pName" placeholder="e.g. Justin Mason">
            </div>
            
            <div class="row-inputs">
                <div class="input-wrapper">
                    <label>Phone Number *</label>
                    <input type="tel" id="pPhone" placeholder="Mobile / Landline">
                </div>
                <div class="input-wrapper">
                    <label>Party Type *</label>
                    <select id="pType">
                        <option value="Customer">Customer</option>
                        <option value="Supplier">Supplier / Vendor</option>
                    </select>
                </div>
            </div>

            <!-- Professional Pending File details -->
            <div style="background: var(--bg-surface); border: 1px solid var(--border-color); padding: 15px; border-radius: var(--border-radius-md); margin-bottom: 20px; box-shadow: var(--shadow-sm);">
                <label style="display: block; font-weight: 800; color: var(--primary-color); margin-bottom: 12px; font-size: 0.85em; text-transform: uppercase;">Pending File / Billing Info</label>
                
                <div class="row-inputs">
                    <div class="input-wrapper" style="margin-bottom: 0;">
                        <label>Ref / Bill Number</label>
                        <input type="text" id="pBillNo" placeholder="e.g. INV-0012">
                    </div>
                    <div class="input-wrapper" style="margin-bottom: 0;">
                        <label>Pending Balance (₹)</label>
                        <input type="number" id="pBalance" placeholder="0" min="0">
                    </div>
                </div>
            </div>

            <div class="input-wrapper">
                <label>Address / Location</label>
                <input type="text" id="pAddress" placeholder="Full Address">
            </div>

            <button type="button" class="btn-primary" id="btnSaveParty" style="margin-top: 20px;">
                <span class="material-symbols-outlined">save</span>
                Save Party
            </button>
        </div>
    </div>

    <!-- DELETE CONFIRMATION MODAL -->
    <div class="mini-modal-overlay" id="miniModalDelete">
        <div class="mini-modal-content">
            <div style="text-align: center;">
                <div style="width: 64px; height: 64px; background: rgba(220, 38, 38, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto;">
                    <span class="material-symbols-outlined" style="font-size: 32px; color: var(--danger-color);">delete_forever</span>
                </div>
                <h3 style="margin-bottom: 8px; font-size: 1.15rem; color: var(--text-main); font-weight: 800; text-transform: uppercase;">Delete Party?</h3>
                <p style="color: var(--text-muted); margin-bottom: 24px; font-size: 0.95rem; line-height: 1.5; font-weight: 500;">Are you sure? This will permanently remove this party and their pending file details.</p>
                <input type="hidden" id="deleteTargetId">
                <div style="display: flex; gap: 12px;">
                    <button type="button" onclick="closeMiniModal('miniModalDelete')" style="flex: 1; padding: 12px; border-radius: var(--border-radius-sm); border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); font-weight: 700; cursor: pointer; transition: all 0.2s; text-transform: uppercase;">Cancel</button>
                    <button type="button" id="btnConfirmDelete" class="btn-primary" onclick="executeDeleteParty()" style="flex: 1; background: var(--danger-color); box-shadow: 0 4px 10px rgba(220, 38, 38, 0.2); border: none; padding: 12px;">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { app, db } from './config.js';
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        // Added runTransaction for server-side transactional safety to prevent corruption
        import { collection, doc, getDocs, query, orderBy, limit, startAfter, where, setDoc, updateDoc, deleteDoc, serverTimestamp, runTransaction } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        // Exact Navigation Setup
        const navItems = [
            { name: 'Dashboard', path: 'index.html', icon: '<path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>' },
            { name: 'Billing', path: 'bill.html', icon: '<path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>' },
            { name: 'Production', path: 'production.html', icon: '<path d="M19.36 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.36 8.04A5.994 5.994 0 000 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.64-4.96zM10 17l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>' },
            { name: 'Inventory', path: 'inventory.html', icon: '<path d="M20 2H4c-1.1 0-2 .9-2 2v3.01c0 .72.43 1.34 1 1.69V20c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8.7c.57-.35 1-.97 1-1.69V4c0-1.1-.9-2-2-2zm-5 12H9v-2h6v2zm5-7H4V4h16v3z"/>' },
            { name: 'Purchase', path: 'purchase.html', icon: '<path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>' },
            { name: 'Sales', path: 'sales.html', icon: '<path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/>' },
            { name: 'Parties', path: 'parties.html', icon: '<path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>' },
            { name: 'Expenses', path: 'expenses.html', icon: '<path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>' },
            { name: 'Accounts', path: 'accounts.html', icon: '<path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>' },
            { name: 'Labour', path: 'attendance.html', icon: '<path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>' }
        ];

        const desktopNav = document.getElementById('desktop-nav');
        const mobileNav = document.getElementById('mobile-nav');
        const currentPath = window.location.pathname.split('/').pop() || 'parties.html';

        navItems.forEach(item => {
            const isActive = currentPath === item.path ? 'active' : '';
            const html = `
                <a href="${item.path}" class="nav-item ${isActive}">
                    <svg class="nav-icon" viewBox="0 0 24 24">${item.icon}</svg>
                    <span>${item.name}</span>
                </a>
            `;
            desktopNav.innerHTML += html;
            mobileNav.innerHTML += html;
        });

        // Utilities
        window.vibrateApp = function(pattern) { if (navigator.vibrate) navigator.vibrate(pattern); };
        
        window.showToast = function(msg, type = "success") {
            vibrateApp(type === "error" ? 40 : 20);
            const toast = document.getElementById(type === "error" ? 'errorToast' : 'successToast');
            document.getElementById(type === "error" ? 'errorToastText' : 'successToastText').innerText = msg;
            toast.style.display = 'flex';
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.style.display = 'none', 300);
            }, 3000);
        };

        const formatCurrency = (val) => Number(val).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});

        // Modal Logic
        window.openModal = function(modalId) {
            vibrateApp(20);
            document.getElementById(modalId).classList.add('active');
            history.pushState({ modal: modalId }, '', `#${modalId}`);
        };
        window.addEventListener('popstate', (e) => {
            document.querySelectorAll('.modal.active').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.mini-modal-overlay.active').forEach(m => m.classList.remove('active'));
            if (e.state && e.state.modal) document.getElementById(e.state.modal).classList.add('active');
        });

        window.openMiniModal = function(id) { vibrateApp(20); document.getElementById(id).classList.add('active'); };
        window.closeMiniModal = function(id) { document.getElementById(id).classList.remove('active'); };

        function generateSearchTokens(str1, str2) {
            const combined = `${str1 || ''} ${str2 || ''}`.toLowerCase().replace(/[.\/\\~*\[\]]/g, ' ');
            const words = combined.split(/[\s\-_]+/).filter(w => w.trim().length > 0);
            const tokens = {};
            words.forEach(w => {
                let prefix = '';
                for (let i = 0; i < w.length; i++) {
                    prefix += w[i];
                    tokens[prefix] = true;
                }
            });
            return tokens;
        }

        // Global Variables
        let currentUser = null;
        let partyCache = [];
        let lastVisibleDoc = null;
        let isFetching = false;
        let hasMore = true;
        let currentSearch = '';
        let isPendingFilter = false;

        // Filter Logic
        window.togglePendingFilter = function() {
            const btn = document.getElementById('btnPendingFilter');
            isPendingFilter = !isPendingFilter;
            if(isPendingFilter) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
            document.getElementById('searchInput').value = '';
            currentSearch = '';
            loadParties(false);
        };

        // Auth
        const auth = getAuth(app);
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loadParties();
            } else {
                window.location.replace('login.html');
            }
        });

        // Add/Edit Party Logic
        window.openPartyModal = function(id = null) {
            if (id) {
                // Edit
                const item = partyCache.find(i => i.id === id);
                if(!item) return;
                document.getElementById('modalPartyTitle').innerText = "Edit Ledger Details";
                document.getElementById('editPartyId').value = id;
                document.getElementById('pName').value = item.name;
                document.getElementById('pPhone').value = item.phone || '';
                document.getElementById('pType').value = item.type || 'Customer';
                document.getElementById('pBillNo').value = item.pendingBillNo || '';
                document.getElementById('pBalance').value = item.balance || 0;
                document.getElementById('pAddress').value = item.address || '';
            } else {
                // New
                document.getElementById('modalPartyTitle').innerText = "Create New Ledger";
                document.getElementById('editPartyId').value = '';
                document.getElementById('pName').value = '';
                document.getElementById('pPhone').value = '';
                document.getElementById('pType').value = 'Customer';
                document.getElementById('pBillNo').value = '';
                document.getElementById('pBalance').value = '';
                document.getElementById('pAddress').value = '';
            }
            openModal('modalParty');
        };

        document.getElementById('btnSaveParty').addEventListener('click', async () => {
            vibrateApp(30);
            const id = document.getElementById('editPartyId').value;
            const name = document.getElementById('pName').value.trim();
            const phone = document.getElementById('pPhone').value.trim();
            const type = document.getElementById('pType').value;
            const pendingBillNo = document.getElementById('pBillNo').value.trim();
            const balance = parseFloat(document.getElementById('pBalance').value) || 0;
            const address = document.getElementById('pAddress').value.trim();

            if (!name || !phone) {
                showToast("Name and Phone Number are required.", "error"); return;
            }

            const btn = document.getElementById('btnSaveParty');
            btn.disabled = true; btn.innerHTML = "Saving Ledger...";

            try {
                const payload = {
                    name,
                    phone,
                    type,
                    pendingBillNo,
                    balance,
                    address,
                    searchTokens: generateSearchTokens(name, pendingBillNo),
                    lastUpdated: new Date().toISOString()
                };

                // Server-side Transaction to prevent file/data corruption
                await runTransaction(db, async (transaction) => {
                    if (id) {
                        // Update
                        const docRef = doc(db, "parties", id);
                        transaction.update(docRef, payload);
                    } else {
                        // Create New
                        payload.createdAt = serverTimestamp();
                        payload.createdBy = currentUser?.displayName || "Admin";
                        
                        const docRef = doc(collection(db, "parties"));
                        transaction.set(docRef, payload);
                    }
                });

                if (id) {
                    showToast("Ledger details updated!", "success");
                } else {
                    showToast("New Ledger created!", "success");
                }
                
                history.back(); // Close modal
                
                // Refresh list
                currentSearch = '';
                document.getElementById('searchInput').value = '';
                loadParties();
                
            } catch(err) {
                console.error(err);
                showToast("Transaction failed to save party details", "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span class="material-symbols-outlined">save</span> Save Party`;
            }
        });

        // Delete Logic
        window.confirmDeleteParty = function(id) {
            vibrateApp(20);
            document.getElementById('deleteTargetId').value = id;
            openMiniModal('miniModalDelete');
        };

        window.executeDeleteParty = async function() {
            vibrateApp(30);
            const id = document.getElementById('deleteTargetId').value;
            if(!id) return;
            
            const btn = document.getElementById('btnConfirmDelete');
            btn.disabled = true; btn.innerText = "Deleting...";

            try {
                const docRef = doc(db, "parties", id);
                // Also wrap delete in a transaction block to maintain exact sync safety
                await runTransaction(db, async (transaction) => {
                    transaction.delete(docRef);
                });
                showToast("Ledger deleted successfully!", "success");
                closeMiniModal('miniModalDelete');
                loadParties(); 
            } catch(err) {
                console.error(err);
                showToast("Transaction failed to delete party", "error");
            } finally {
                btn.disabled = false; btn.innerText = "Delete";
            }
        };

        // --- Fetch & Render Logic ---
        function renderSkeletons() {
            const grid = document.getElementById('partyGrid');
            let html = '';
            for(let i=0; i<6; i++) {
                html += `
                <div class="party-card" style="border-color: transparent; box-shadow: none;">
                    <div style="display:flex; justify-content:space-between;">
                        <div style="flex:1;">
                            <div class="skeleton" style="height:14px; width:30%; margin-bottom:8px; border-radius:4px;"></div>
                            <div class="skeleton" style="height:20px; width:70%; margin-bottom:12px; border-radius:4px;"></div>
                            <div class="skeleton" style="height:14px; width:40%; border-radius:4px;"></div>
                        </div>
                        <div class="skeleton" style="height:50px; width:90px; border-radius:4px;"></div>
                    </div>
                </div>`;
            }
            grid.innerHTML = html;
        }

        async function loadParties(isLoadMore = false) {
            if (isLoadMore) {
                if (isFetching || !hasMore) return;
                isFetching = true;
                document.getElementById('scrollLoader').style.display = 'flex';
            } else {
                hasMore = true;
                lastVisibleDoc = null;
                partyCache = [];
                isFetching = true;
                renderSkeletons();
            }

            try {
                let q = collection(db, "parties");
                
                // Filter: Only show parties with an outstanding balance > 0
                if (isPendingFilter) {
                    q = query(q, where("balance", ">", 0)); 
                }
                
                // Search
                if (currentSearch !== '') {
                    const searchWords = currentSearch.replace(/[.\/\\~*\[\]]/g, ' ').split(/[\s\-_]+/).filter(w => w.trim().length > 0);
                    searchWords.forEach(word => {
                        q = query(q, where(`searchTokens.${word}`, "==", true));
                    });
                }
                
                // FIXED THE TOP RIGHT ICON ERROR: 
                // Firestore requires the first orderBy field to match the inequality field (where > 0).
                if (isPendingFilter) {
                    if (lastVisibleDoc) {
                        q = query(q, orderBy("balance", "desc"), startAfter(lastVisibleDoc), limit(15));
                    } else {
                        q = query(q, orderBy("balance", "desc"), limit(15));
                    }
                } else {
                    if (lastVisibleDoc) {
                        q = query(q, orderBy("createdAt", "desc"), startAfter(lastVisibleDoc), limit(15));
                    } else {
                        q = query(q, orderBy("createdAt", "desc"), limit(15));
                    }
                }

                const snap = await getDocs(q);
                
                if (snap.empty) {
                    hasMore = false;
                    if (!isLoadMore) {
                        document.getElementById('partyGrid').innerHTML = `
                            <div style="text-align:center; padding: 40px 20px; color:var(--text-muted);">
                                <span class="material-symbols-outlined" style="font-size: 48px; opacity: 0.3; margin-bottom: 10px;">account_balance_wallet</span>
                                <h3>No Ledgers Found</h3>
                                <p style="font-size: 0.9em; margin-top: 5px;">Add a new client/vendor to manage their records.</p>
                            </div>
                        `;
                    }
                } else {
                    lastVisibleDoc = snap.docs[snap.docs.length - 1];
                    if (snap.docs.length < 15) hasMore = false;

                    const newItems = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (!isLoadMore) {
                        partyCache = newItems;
                        document.getElementById('partyGrid').innerHTML = '';
                    } else {
                        partyCache = [...partyCache, ...newItems];
                    }

                    renderCards(newItems);
                }

            } catch (error) {
                console.error("Error loading parties:", error);
                if (!isLoadMore) document.getElementById('partyGrid').innerHTML = '<div style="padding:20px; color:var(--danger-color); text-align:center; font-weight:700;">Data retrieval failed. Please check network or indices.</div>';
            } finally {
                isFetching = false;
                document.getElementById('scrollLoader').style.display = 'none';
            }
        }

        function renderCards(items) {
            const grid = document.getElementById('partyGrid');
            
            items.forEach(item => {
                const badgeClass = item.type === 'Supplier' ? 'badge-supplier' : 'badge-customer';
                const balClass = item.balance > 0 ? 'pending' : '';
                const formatBal = item.balance > 0 ? `₹${formatCurrency(item.balance)}` : 'NIL';
                
                // Only Direct Call Button Included
                const callBtn = item.phone ? 
                    `<a href="tel:${item.phone}" class="btn-card-action btn-call" title="Call ${item.name}">
                        <span class="material-symbols-outlined" style="font-size: 18px;">call</span> Call
                    </a>` : '';

                const html = `
                    <div class="party-card">
                        <div class="party-header">
                            <div class="party-info">
                                <span class="party-type-badge ${badgeClass}">${item.type || 'Customer'}</span>
                                <div class="party-name">${item.name}</div>
                                <div class="party-meta"><span class="material-symbols-outlined">call</span> ${item.phone || 'No Phone'}</div>
                                ${item.address ? `<div class="party-meta"><span class="material-symbols-outlined">location_on</span> ${item.address}</div>` : ''}
                            </div>
                            
                            <div class="party-balance-box">
                                <div class="party-bal-label">Balance Due</div>
                                <div class="party-bal-val ${balClass}">${formatBal}</div>
                                ${item.pendingBillNo ? `<div class="party-bill-no">Ref: ${item.pendingBillNo}</div>` : ''}
                            </div>
                        </div>

                        <div class="party-footer">
                            <div class="action-group">
                                ${callBtn}
                            </div>
                            <div class="action-group">
                                <button class="btn-card-action btn-edit" onclick="openPartyModal('${item.id}')" title="Edit">
                                    <span class="material-symbols-outlined" style="font-size: 20px;">edit</span>
                                </button>
                                <button class="btn-card-action btn-delete" onclick="confirmDeleteParty('${item.id}')" title="Delete">
                                    <span class="material-symbols-outlined" style="font-size: 20px;">delete</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', html);
            });
        }

        // Search Input Handling
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            currentSearch = e.target.value.trim();
            searchTimeout = setTimeout(() => {
                loadParties(false);
            }, 500);
        });

        // Infinite Scroll
        document.getElementById('mainScroll').addEventListener('scroll', (e) => {
            const { scrollTop, scrollHeight, clientHeight } = e.target;
            if (scrollTop + clientHeight >= scrollHeight - 50) {
                loadParties(true);
            }
        });

    </script>
</body>
</html>
