<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Shared Expenses - LITHIK BEVERAGE</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a">
    <link rel="apple-touch-icon" href="images/icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Shared Core Theme from LITHIK BEVERAGE Inventory */
        :root {
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --bg-nav: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary-color: #1e40af;
            --accent-color: #0ea5e9;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --border-color: #e2e8f0;
            --input-bg: #f1f5f9;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #020617;
                --bg-surface: #0f172a;
                --bg-nav: #0f172a;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --primary-color: #3b82f6;
                --accent-color: #0ea5e9;
                --border-color: #1e293b;
                --input-bg: #1e293b;
                --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
                --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
                --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            }
            /* Dark mode style safety overrides */
            body { background-color: #020617 !important; color: #f8fafc !important; }
            .bg-white { background-color: #0f172a !important; }
            .border-gray-200, .border-slate-200, .border-slate-100 { border-color: #1e293b !important; }
            .bg-slate-50, .bg-slate-100 { background-color: #1e293b !important; }
            .text-slate-800, .text-gray-800 { color: #f8fafc !important; }
            .text-slate-600, .text-slate-400 { color: #94a3b8 !important; }
            input, select { background-color: #1e293b !important; color: #f8fafc !important; border-color: #334155 !important; }
        }

        /* Reset & Base Layout */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); height: 100%; width: 100vw; overflow: hidden; margin: 0; padding: 0; }
        
        /* Custom scrollbar config matching the design system */
        .custom-scrollbar::-webkit-scrollbar { width: 0px; height: 0px; display: none !important; }
        .custom-scrollbar { -ms-overflow-style: none !important; scrollbar-width: none !important; }

        header, .material-symbols-outlined, .nav-item {
            -webkit-user-select: none; user-select: none;
        }
        .material-symbols-outlined { display: inline-flex; align-items: center; justify-content: center; }

        /* Layout Structure */
        #app-shell { display: flex; height: 100%; width: 100%; position: absolute; inset: 0; flex-direction: column; overflow: hidden; }
        
        header { display: flex; align-items: center; justify-content: space-between; background-color: var(--bg-surface); padding: 12px 20px; border-bottom: 1px solid var(--border-color); z-index: 10; flex-shrink: 0; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        
        .company-logo { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; box-shadow: var(--shadow-sm); }
        h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 0.5px; color: var(--primary-color); margin: 0; }

        .layout-container { display: flex; flex: 1; overflow: hidden; min-height: 0; }
        
        /* Navigation Sidebar */
        nav.sidebar { display: none; width: 260px; background-color: var(--bg-nav); border-right: 1px solid var(--border-color); flex-direction: column; padding: 20px 0; overflow-y: auto; }
        nav.sidebar .nav-item { display: flex; align-items: center; text-decoration: none; color: var(--text-muted); padding: 14px 24px; gap: 16px; font-size: 1rem; font-weight: 500; transition: all 0.2s; cursor: pointer; }
        nav.sidebar .nav-item:hover, nav.sidebar .nav-item.active { background-color: rgba(59, 130, 246, 0.05); color: var(--primary-color); border-right: 3px solid var(--primary-color); }
        
        /* Navigation Bottom Menu */
        nav.bottom-nav { display: flex; background-color: var(--bg-nav); border-top: 1px solid var(--border-color); min-height: 65px; height: calc(65px + env(safe-area-inset-bottom)); width: 100%; overflow-x: auto; overflow-y: hidden; scroll-behavior: smooth; padding: 0 10px; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); position: relative; z-index: 100; }
        nav.bottom-nav .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: var(--text-muted); min-width: 72px; padding: 8px 4px; gap: 4px; font-size: 0.75rem; font-weight: 600; transition: all 0.2s; cursor: pointer; }
        nav.bottom-nav .nav-item.active { color: var(--primary-color); }
        .nav-icon { width: 24px; height: 24px; fill: currentColor; }

        /* Main Workspace Scroll Area */
        .main-scroll-area { flex: 1; overflow-y: auto; padding: 20px; background-color: var(--bg-body); position: relative; }
        .container-inner { max-width: 1200px; margin: 0 auto; width: 100%; }

        @media (min-width: 768px) {
            nav.bottom-nav { display: none; }
            nav.sidebar { display: flex; }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen flex flex-col overflow-hidden">

    <div id="app-shell">
        <!-- Unified Global Navigation Header -->
        <header>
            <div class="header-left">
                <img src="images/icon.png" alt="Logo" class="company-logo" onerror="this.src='https://via.placeholder.com/40'">
                <h1>LITHIK BEVERAGE</h1>
            </div>
            <div class="header-right">
                <span id="user-email-display" class="text-sm font-medium hidden md:block" style="color: var(--text-muted);"></span>
                <button id="logout-btn" style="background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 16px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s;">
                    Logout
                </button>
            </div>
        </header>

        <!-- Main Core Layout Container -->
        <div class="layout-container">
            <!-- Sidebar Desktop Navigation Grid Container -->
            <nav class="sidebar" id="desktop-nav"></nav>

            <!-- Main Working View Panel Area -->
            <div class="main-scroll-area custom-scrollbar" id="mainScroll">
                <div class="container-inner">
                    
                    <main class="w-full flex flex-col lg:flex-row gap-6 overflow-hidden">
                        
                        <!-- Left Column Structure: Operating Controls & Entry Form -->
                        <div class="w-full lg:w-1/3 flex flex-col gap-6">
                            
                            <!-- Production Date System Controller -->
                            <div class="bg-white rounded-2xl shadow-sm p-5 border border-gray-200 transition">
                                <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Operating Date</h2>
                                <div class="flex items-center justify-between bg-slate-50 p-2 rounded-xl border border-slate-200">
                                    <button id="prev-day" class="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition">
                                        <i class="fa-solid fa-arrow-left"></i>
                                    </button>
                                    <input type="date" id="date-picker" class="font-bold text-slate-800 bg-transparent border-none focus:ring-0 cursor-pointer text-center outline-none">
                                    <button id="next-day" class="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition">
                                        <i class="fa-solid fa-arrow-right"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Add Expense Data Submission Form -->
                            <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-200 transition">
                                <h3 class="text-lg font-bold mb-4 text-slate-800 flex items-center gap-2">
                                    <i class="fa-solid fa-plus-circle text-blue-500"></i> New Expense
                                </h3>
                                <form id="add-expense-form" class="space-y-4">
                                    <div>
                                        <label class="block text-sm font-medium text-slate-600 mb-1">Description</label>
                                        <input type="text" id="expense-desc" required placeholder="What was this for?" 
                                            class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                                    </div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-sm font-medium text-slate-600 mb-1">Category</label>
                                            <select id="expense-category" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                                                <option value="Food">Food</option>
                                                <option value="Travel">Travel</option>
                                                <option value="Software">Software</option>
                                                <option value="Office">Office</option>
                                                <option value="Other">Other</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label class="block text-sm font-medium text-slate-600 mb-1">Amount</label>
                                            <div class="relative">
                                                <span class="absolute left-3 top-2.5 text-slate-400">$</span>
                                                <input type="number" id="expense-amount" required min="0.01" step="0.01" placeholder="0.00" 
                                                    class="w-full pl-8 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                                            </div>
                                        </div>
                                    </div>
                                    <button type="submit" id="submit-btn" class="w-full mt-2 bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition flex justify-center items-center gap-2" style="background-color: var(--primary-color);">
                                        <span>Save to Shared Ledger</span>
                                    </button>
                                </form>
                            </div>
                        </div>

                        <!-- Right Column Structure: Live Visuals & Data Feed -->
                        <div class="w-full lg:w-2/3 flex flex-col min-h-[500px]">
                            
                            <!-- Shared Total Metric Panel -->
                            <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl shadow-lg p-6 mb-6 text-white flex justify-between items-center flex-shrink-0" style="background: linear-gradient(135deg, var(--primary-color) 0%, #0f172a 100%);">
                                <div>
                                    <p class="text-slate-300 text-sm font-medium mb-1">Shared Total for <span id="display-date-text" class="text-white font-bold">Today</span></p>
                                    <div class="flex items-end gap-2">
                                        <h2 class="text-4xl font-extrabold tracking-tight">$<span id="total-amount">0.00</span></h2>
                                        <span class="text-slate-400 text-sm mb-1">USD</span>
                                    </div>
                                </div>
                                <div class="bg-white/10 p-4 rounded-full border border-white/20">
                                    <i class="fa-solid fa-chart-line text-3xl text-blue-400"></i>
                                </div>
                            </div>

                            <!-- Live Paginated Data Feed List Container -->
                            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 flex-grow flex flex-col overflow-hidden relative transition">
                                <div class="p-4 border-b border-gray-100 bg-slate-50 flex justify-between items-center flex-shrink-0">
                                    <h3 class="font-bold text-slate-800">Expense Feed</h3>
                                    <span id="record-status" class="text-xs font-medium text-slate-500">Live Updates Enabled</span>
                                </div>
                                
                                <!-- Infinite Scroll Target Wrapper -->
                                <div id="expense-container" class="flex-grow overflow-y-auto custom-scrollbar relative p-4 max-h-[600px]">
                                    
                                    <div id="empty-state" class="hidden min-h-[200px] flex flex-col justify-center items-center text-slate-400">
                                        <i class="fa-solid fa-folder-open text-5xl mb-4 text-slate-200"></i>
                                        <p>No expenses recorded yet for this date.</p>
                                    </div>

                                    <ul id="expense-list" class="space-y-3">
                                        <!-- Data nodes dynamically injected here via listener callback execution -->
                                    </ul>

                                    <!-- Infinite Scroll Interaction Sentinel -->
                                    <div id="scroll-sentinel" class="h-10 w-full flex justify-center items-center text-slate-400 mt-4 opacity-0 transition-opacity">
                                        <i class="fa-solid fa-circle-notch fa-spin"></i> <span class="ml-2 text-sm">Loading more...</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                </div>
            </div>
        </div>

        <!-- Mobile Dynamic Floating Bottom View Navigation Bar -->
        <nav class="bottom-nav" id="mobile-nav"></nav>
    </div>

    <!-- Firebase SDK Implementation Modules (v10 Modular Architecture) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, deleteDoc, query, where, orderBy, limit, onSnapshot, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ==========================================
        // ⚠️ FIREBASE CONFIGURATION REPOSITORY MATRIX
        // ==========================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Core System State Variables
        let currentUser = null;
        let currentDateString = getLocalYYYYMMDD(new Date());
        
        // Active Realtime Listeners & Pagination Boundaries References
        let totalUnsubscribe = null;
        let expensesUnsubscribe = null;
        let currentLimit = 10; // Load 10 items initially

        // Unified DOM Mapped Nodes Elements Reference
        const datePicker = document.getElementById('date-picker');
        const displayDateText = document.getElementById('display-date-text');
        const form = document.getElementById('add-expense-form');
        const totalAmountEl = document.getElementById('total-amount');
        const expenseListEl = document.getElementById('expense-list');
        const emptyState = document.getElementById('empty-state');
        const scrollSentinel = document.getElementById('scroll-sentinel');

        // Dynamic System Navigation Configuration Layout
        const navItems = [
            { name: 'Dashboard', path: 'index.html', icon: '<path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>' },
            { name: 'Billing', path: 'bill.html', icon: '<path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>' },
            { name: 'Production', path: 'production.html', icon: '<path d="M19.36 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.36 8.04A5.994 5.994 0 000 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.64-4.96zM10 17l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>' },
            { name: 'Inventory', path: 'inventory.html', icon: '<path d="M20 2H4c-1.1 0-2 .9-2 2v3.01c0 .72.43 1.34 1 1.69V20c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8.7c.57-.35 1-.97 1-1.69V4c0-1.1-.9-2-2-2zm-5 12H9v-2h6v2zm5-7H4V4h16v3z"/>' },
            { name: 'Purchase', path: 'purchase.html', icon: '<path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>' },
            { name: 'Sales', path: 'sales.html', icon: '<path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/>' },
            { name: 'Parties', path: 'parties.html', icon: '<path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>' },
            { name: 'Expenses', path: 'expenses.html', icon: '<path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>' },
            { name: 'Accounts', path: 'accounts.html', icon: '<path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>' },
            { name: 'Labour', path: 'attendance.html', icon: '<path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>' }
        ];

        const desktopNav = document.getElementById('desktop-nav');
        const mobileNav = document.getElementById('mobile-nav');

        navItems.forEach(item => {
            // Set active state if matching the target system context route
            const isActive = item.name === 'Expenses' ? 'active' : '';
            const html = `
                <a href="${item.path}" class="nav-item ${isActive}">
                    <svg class="nav-icon" viewBox="0 0 24 24">${item.icon}</svg>
                    <span>${item.name}</span>
                </a>
            `;
            desktopNav.innerHTML += html;
            mobileNav.innerHTML += html;
        });

        // --- 1. AUTHENTICATION STATUS ENGINE ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-email-display').innerText = user.email;
                initializeSystem();
            } else {
                // Safeguard against aggressive auto-closing loops when opened unauthenticated locally
                console.warn("User state unauthenticated. Retaining screen layout for configuration verification.");
                // Fallback check to prevent browser crash/closure loop if index.html is local or missing
                if (window.location.protocol !== 'file:') {
                    window.location.href = "login.html";
                }
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // --- 2. DATE MANAGEMENT PIPELINE (Auto Today Local System) ---
        function getLocalYYYYMMDD(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function initializeSystem() {
            // Bind input values to current processing scope
            datePicker.value = currentDateString;
            updateDateDisplay();

            // Date Selection Mutation Observers
            datePicker.addEventListener('change', (e) => changeDate(e.target.value));
            
            document.getElementById('prev-day').addEventListener('click', () => {
                const d = new Date(currentDateString + 'T12:00:00');
                d.setDate(d.getDate() - 1);
                changeDate(getLocalYYYYMMDD(d));
            });

            document.getElementById('next-day').addEventListener('click', () => {
                const d = new Date(currentDateString + 'T12:00:00');
                d.setDate(d.getDate() + 1);
                changeDate(getLocalYYYYMMDD(d));
            });

            setupInfiniteScroll();
            attachDatabaseListeners();
        }

        function changeDate(newDateStr) {
            currentDateString = newDateStr;
            datePicker.value = newDateStr;
            currentLimit = 10; // Reset pagination boundaries on data window adjustments
            expenseListEl.innerHTML = ''; 
            updateDateDisplay();
            attachDatabaseListeners();
        }

        function updateDateDisplay() {
            const today = getLocalYYYYMMDD(new Date());
            if (currentDateString === today) {
                displayDateText.innerText = "Today";
            } else {
                const d = new Date(currentDateString + 'T12:00:00');
                displayDateText.innerText = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
            }
        }

        // --- 3. DATABASE STREAM LISTENERS (Realtime Shared Ledgers Sync) ---
        function attachDatabaseListeners() {
            // Clean up old context streams references
            if (totalUnsubscribe) totalUnsubscribe();
            if (expensesUnsubscribe) expensesUnsubscribe();

            // A. Listen to Shared Daily Total Node
            const dailyTotalRef = doc(db, 'dailyTotals', currentDateString);
            totalUnsubscribe = onSnapshot(dailyTotalRef, (docSnap) => {
                if (docSnap.exists()) {
                    totalAmountEl.innerText = (docSnap.data().totalAmount || 0).toFixed(2);
                } else {
                    totalAmountEl.innerText = "0.00";
                }
            });

            // B. Listen to Paginated Expenses Feed Collection Array
            const expensesQuery = query(
                collection(db, 'expenses'),
                where('date', '==', currentDateString),
                orderBy('timestamp', 'desc'),
                limit(currentLimit)
            );

            expensesUnsubscribe = onSnapshot(expensesQuery, (snapshot) => {
                renderExpenses(snapshot.docs);
                
                // Toggle scroll sentinel display states depending on buffer threshold availability
                if (snapshot.docs.length >= currentLimit) {
                    scrollSentinel.classList.remove('hidden');
                } else {
                    scrollSentinel.classList.add('hidden');
                }
            });
        }

        // --- 4. INFINITE SCROLL CONTROLLER (Intersection Observer Matrix) ---
        function setupInfiniteScroll() {
            const observer = new IntersectionObserver((entries) => {
                const sentinel = entries[0];
                if (sentinel.isIntersecting && !scrollSentinel.classList.contains('hidden')) {
                    scrollSentinel.style.opacity = '1';
                    currentLimit += 10;
                    attachDatabaseListeners(); // Re-attach listener stream with advanced upper boundary parameters
                } else {
                    scrollSentinel.style.opacity = '0';
                }
            }, { root: document.getElementById('expense-container'), threshold: 0.1 });

            observer.observe(scrollSentinel);
        }

        // --- 5. DATA INGESTION ENGINE (Atomic Document Transformations) ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            
            const desc = document.getElementById('expense-desc').value;
            const category = document.getElementById('expense-category').value;
            const amount = parseFloat(document.getElementById('expense-amount').value);
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';

            try {
                // 1. Commit baseline entry allocation payload
                await addDoc(collection(db, 'expenses'), {
                    desc,
                    category,
                    amount,
                    date: currentDateString,
                    timestamp: Date.now(),
                    creatorEmail: currentUser.email,
                    creatorUid: currentUser.uid
                });

                // 2. Adjust daily aggregated matrix counter via atomic increments
                const dailyTotalRef = doc(db, 'dailyTotals', currentDateString);
                await setDoc(dailyTotalRef, {
                    totalAmount: increment(amount),
                    date: currentDateString
                }, { merge: true });

                form.reset();
            } catch (error) {
                console.error("Error saving record parameters:", error);
                alert("Failed to save expense entry details.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Save to Shared Ledger';
            }
        });

        // --- 6. ATOMIC DATA PURGING METHOD ---
        window.deleteSharedExpense = async function(docId, amount, creatorUid) {
            // Identity domain match validation guardrails
            if (currentUser.uid !== creatorUid) {
                alert("You can only delete your own entries.");
                return;
            }

            if (!confirm("Remove this entry from the shared ledger?")) return;

            try {
                // 1. Terminate entry pointer target context doc
                await deleteDoc(doc(db, 'expenses', docId));
                
                // 2. Perform balancing subtraction modification on global daily node bounds
                const dailyTotalRef = doc(db, 'dailyTotals', currentDateString);
                await setDoc(dailyTotalRef, {
                    totalAmount: increment(-amount)
                }, { merge: true });

            } catch (error) {
                console.error("Error deleting target entity context:", error);
                alert("Failed to delete requested ledger row.");
            }
        };

        // --- 7. DYNAMIC UI RENDERING INTERACTION MATRIX ---
        function renderExpenses(docs) {
            if (docs.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.style.display = 'flex';
                expenseListEl.innerHTML = '';
                return;
            }

            emptyState.classList.add('hidden');
            emptyState.style.display = 'none';
            
            const categoryStyles = {
                'Food': 'bg-orange-100 text-orange-600',
                'Travel': 'bg-blue-100 text-blue-600',
                'Software': 'bg-purple-100 text-purple-600',
                'Office': 'bg-emerald-100 text-emerald-600',
                'Other': 'bg-slate-100 text-slate-600'
            };

            const icons = {
                'Food': 'fa-burger', 'Travel': 'fa-plane', 'Software': 'fa-code',
                'Office': 'fa-paperclip', 'Other': 'fa-tag'
            };

            expenseListEl.innerHTML = docs.map(docSnap => {
                const data = docSnap.data();
                const style = categoryStyles[data.category] || categoryStyles['Other'];
                const icon = icons[data.category] || icons['Other'];
                const isMine = data.creatorUid === currentUser.uid;

                return `
                <li class="bg-white border border-slate-100 p-4 rounded-xl shadow-sm hover:shadow-md transition group flex justify-between items-center relative overflow-hidden">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full flex items-center justify-center ${style}">
                            <i class="fa-solid ${icon} text-lg"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-slate-800 text-md leading-tight">${data.desc}</h4>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-xs font-medium text-slate-400 bg-slate-50 px-2 py-0.5 rounded">${data.category}</span>
                                <span class="text-xs text-slate-400">&bull; Added by ${data.creatorEmail ? data.creatorEmail.split('@')[0] : 'System'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-1">
                        <span class="font-extrabold text-slate-800 text-lg">$${data.amount.toFixed(2)}</span>
                        ${isMine ? `
                        <button onclick="deleteSharedExpense('${docSnap.id}', ${data.amount}, '${data.creatorUid}')" 
                            class="text-red-400 hover:text-red-600 text-sm opacity-0 group-hover:opacity-100 transition">
                            <i class="fa-solid fa-trash-can"></i> Remove
                        </button>
                        ` : '<span class="text-xs text-slate-300">Shared</span>'}
                    </div>
                </li>`;
            }).join('');
        }
    </script>
</body>
</html>
