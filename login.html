<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - LITHIK BEVERAGE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* CSS Variables for Auto Dark/Light Mode */
        :root {
            --bg-color: #f4f7f6;
            --surface-color: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary-color: #0056b3;
            --border-color: #e2e8f0;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --surface-color: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --primary-color: #38bdf8;
                --border-color: #334155;
                --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            }
        }

        /* Strict Layout Rules: No copy, no scrollbars */
        * {
            box-sizing: border-box;
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none;    /* Firefox */
            -ms-user-select: none;     /* IE10+/Edge */
            user-select: none;         /* Standard */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Prevents sidebars/scrollbars */
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .login-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            padding: 40px 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            transition: background-color 0.3s ease;
        }

        .company-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            pointer-events: none; /* Prevents dragging the image */
        }

        h1 {
            font-weight: 800;
            font-size: 1.5rem;
            margin: 0 0 5px 0;
            letter-spacing: 0.5px;
        }

        p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Buttons & Inputs */
        button {
            width: 100%;
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        input {
            width: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            margin-bottom: 20px;
            -webkit-user-select: auto; /* Allow selecting text inside input only */
            user-select: auto;
        }

        input:focus {
            outline: 2px solid var(--primary-color);
            border-color: transparent;
        }

        /* New User Setup Section (Hidden by default) */
        #setup-section {
            display: none;
        }

        .profile-pic {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid var(--primary-color);
            margin-bottom: 20px;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="login-card">
        
        <div id="login-section">
            <img src="images/icon.jpg" alt="Company Logo" class="company-logo" onerror="this.src='https://via.placeholder.com/80?text=Logo'">
            <h1>LITHIK BEVERAGE</h1>
            <p>Operations & Billing Portal</p>
            
            <button id="google-login-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </button>
        </div>

        <div id="setup-section">
            <img id="user-profile-pic" src="" alt="User Profile" class="profile-pic">
            <h2>Welcome!</h2>
            <p>Please confirm your name.</p>
            
            <input type="text" id="user-name-input" placeholder="Your Full Name">
            <button id="save-user-btn">Save & Enter Dashboard</button>
        </div>

    </div>

    <script type="module">
        import { app, db } from './config.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // UI Elements
        const loginSection = document.getElementById('login-section');
        const setupSection = document.getElementById('setup-section');
        const loginBtn = document.getElementById('google-login-btn');
        const saveBtn = document.getElementById('save-user-btn');
        const profilePicImg = document.getElementById('user-profile-pic');
        const nameInput = document.getElementById('user-name-input');

        // Temporary storage for user data between steps
        let pendingUserData = null;

        // Step 1: Handle Google Login
        loginBtn.addEventListener('click', async () => {
            try {
                // Open Google Login popup
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // Check if user exists in Firestore
                const userDocRef = doc(db, "users", user.uid);
                const userDocSnap = await getDoc(userDocRef);

                if (userDocSnap.exists()) {
                    // User exists! Redirect immediately
                    window.location.href = 'index.html';
                } else {
                    // New User! Switch UI to setup section
                    pendingUserData = user;
                    
                    loginSection.style.display = 'none';
                    setupSection.style.display = 'block';
                    
                    // Populate picture and input field
                    profilePicImg.src = user.photoURL || 'https://via.placeholder.com/90';
                    nameInput.value = user.displayName || '';
                }
            } catch (error) {
                console.error("Login failed:", error);
                alert("Failed to sign in. Please try again.");
            }
        });

        // Step 2: Save New User to Firestore
        saveBtn.addEventListener('click', async () => {
            const finalName = nameInput.value.trim();
            
            if (!finalName) {
                alert("Please enter your name.");
                return;
            }

            try {
                // Disable button to prevent double-clicks
                saveBtn.disabled = true;
                saveBtn.innerText = "Saving...";

                // Create the user document in Firestore
                await setDoc(doc(db, "users", pendingUserData.uid), {
                    uid: pendingUserData.uid,
                    name: finalName,
                    email: pendingUserData.email,
                    photoURL: pendingUserData.photoURL,
                    role: "pending", // Default role, admin will upgrade them later
                    createdAt: new Date().toISOString()
                });

                // Redirect on success
                window.location.href = 'index.html';

            } catch (error) {
                console.error("Failed to save user:", error);
                alert("Could not save profile. Check connection.");
                saveBtn.disabled = false;
                saveBtn.innerText = "Save & Enter Dashboard";
            }
        });
    </script>
</body>
</html>
