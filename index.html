<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - LITHIK BEVERAGE</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* CSS Variables */
        :root {
            --bg-body: #f1f5f9;
            --bg-surface: #ffffff;
            --bg-nav: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary-color: #1e40af;
            --primary-hover: #1e3a8a;
            --border-color: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #020617;
                --bg-surface: #0f172a;
                --bg-nav: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --primary-color: #3b82f6;
                --primary-hover: #60a5fa;
                --border-color: #334155;
                --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
                --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            }
        }

        /* Reset & Layout */
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        html, body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Prevent body scroll, handle scroll in main */
        }

        /* Aggressively Hide All Scrollbars */
        *::-webkit-scrollbar { display: none !important; }
        * { -ms-overflow-style: none !important; scrollbar-width: none !important; }

        /* Application Shell */
        #app-shell {
            display: flex;
            height: 100vh;
            width: 100vw;
            flex-direction: column;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-surface);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .company-logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: var(--primary-color);
        }

        .profile-pic {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--primary-color);
            cursor: pointer;
            object-fit: cover;
            transition: transform 0.2s;
        }

        .profile-pic:active {
            transform: scale(0.9);
        }

        /* Navigation Layout Control */
        .layout-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Desktop Sidebar (Hidden on Mobile) */
        nav.sidebar {
            display: none;
            width: 260px;
            background-color: var(--bg-nav);
            border-right: 1px solid var(--border-color);
            flex-direction: column;
            padding: 20px 0;
            overflow-y: auto;
        }

        /* Mobile Bottom Nav (Hidden on Desktop) */
        nav.bottom-nav {
            display: flex;
            background-color: var(--bg-nav);
            border-top: 1px solid var(--border-color);
            height: 70px;
            width: 100%;
            overflow-x: auto; /* Horizontal scroll for many items */
            overflow-y: hidden;
            scroll-behavior: smooth;
            padding: 0 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-muted);
            transition: all 0.2s;
            cursor: pointer;
        }

        /* Desktop Nav Item Styles */
        nav.sidebar .nav-item {
            padding: 14px 24px;
            gap: 16px;
            font-size: 1rem;
            font-weight: 500;
        }

        nav.sidebar .nav-item:hover, nav.sidebar .nav-item.active {
            background-color: rgba(30, 64, 175, 0.05);
            color: var(--primary-color);
            border-right: 3px solid var(--primary-color);
        }

        /* Mobile Nav Item Styles */
        nav.bottom-nav .nav-item {
            flex-direction: column;
            justify-content: center;
            min-width: 72px; /* Ensure they don't shrink too much */
            padding: 8px 4px;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        nav.bottom-nav .nav-item.active {
            color: var(--primary-color);
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Main Content Area */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: var(--bg-body);
        }

        /* Dashboard Placeholder Styles */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background-color: var(--bg-surface);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }
        
        .stat-card h3 { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; color: var(--text-main); }

        /* PWA Install Prompt Banner */
        #install-banner {
            position: fixed;
            bottom: 80px; /* Above mobile nav */
            left: 50%;
            transform: translateX(-50%) translateY(150%);
            width: 90%;
            max-width: 400px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #install-banner.show {
            transform: translateX(-50%) translateY(0);
        }

        .install-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .install-info strong { font-size: 0.95rem; }
        .install-info span { font-size: 0.8rem; color: var(--text-muted); }

        .install-actions {
            display: flex;
            gap: 10px;
        }

        .btn-install {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-close {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 8px;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* Media Queries for Desktop layout */
        @media (min-width: 768px) {
            #app-shell { flex-direction: column; }
            .layout-container { flex-direction: row; }
            nav.bottom-nav { display: none; }
            nav.sidebar { display: flex; }
            #install-banner { bottom: 20px; left: auto; right: 20px; transform: translateX(120%); }
            #install-banner.show { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div id="app-shell">
        <header>
            <div class="header-left">
                <img src="images/icon.jpg" alt="Logo" class="company-logo" onerror="this.src='https://via.placeholder.com/40'">
                <h1>LITHIK BEVERAGE</h1>
            </div>
            <img id="header-profile-pic" src="https://via.placeholder.com/40" alt="Profile" class="profile-pic" onclick="window.location.href='admin.html'">
        </header>

        <div class="layout-container">
            <nav class="sidebar" id="desktop-nav">
                </nav>

            <main id="main-view">
                <h2 style="font-size: 1.5rem; font-weight: 700;">Dashboard Overview</h2>
                <p style="color: var(--text-muted); margin-top: 5px;">Welcome back. Here is today's summary.</p>
                
                <div class="dashboard-grid">
                    <div class="stat-card">
                        <h3>Today's Production</h3>
                        <div class="value">1,240 Cases</div>
                    </div>
                    <div class="stat-card">
                        <h3>Invoices Generated</h3>
                        <div class="value">45</div>
                    </div>
                    <div class="stat-card">
                        <h3>Labour Present</h3>
                        <div class="value">18 / 20</div>
                    </div>
                </div>
            </main>
        </div>

        <nav class="bottom-nav" id="mobile-nav">
            </nav>
    </div>

    <div id="install-banner">
        <div class="install-info">
            <strong>Install LITHIK App</strong>
            <span>Add to home screen for offline use</span>
        </div>
        <div class="install-actions">
            <button class="btn-install" id="btn-install-app">Install</button>
            <button class="btn-close" id="btn-close-banner">✕</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW registered!', reg))
                    .catch(err => console.error('SW failed', err));
            });
        }
    </script>

    <script type="module">
        import { app, db } from './config.js';
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

        const auth = getAuth(app);

        // 1. Authentication Check
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in, set profile picture
                document.getElementById('header-profile-pic').src = user.photoURL || 'https://via.placeholder.com/40';
            } else {
                // No user is signed in, boot them to login
                window.location.replace('login.html');
            }
        });

        // 2. Navigation Structure & Generation
        const navItems = [
            { name: 'Dashboard', id: 'nav-home', path: 'index.html', icon: '<path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>' },
            { name: 'Billing', id: 'nav-bill', path: 'bill.html', icon: '<path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>' },
            { name: 'Production', id: 'nav-production', path: 'production.html', icon: '<path d="M19.36 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.36 8.04A5.994 5.994 0 000 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.64-4.96zM10 17l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>' },
            { name: 'Inventory', id: 'nav-inventory', path: 'inventory.html', icon: '<path d="M20 2H4c-1.1 0-2 .9-2 2v3.01c0 .72.43 1.34 1 1.69V20c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8.7c.57-.35 1-.97 1-1.69V4c0-1.1-.9-2-2-2zm-5 12H9v-2h6v2zm5-7H4V4h16v3z"/>' },
            { name: 'Purchase', id: 'nav-purchase', path: 'purchase.html', icon: '<path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>' },
            { name: 'Sales', id: 'nav-sales', path: 'sales.html', icon: '<path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/>' },
            { name: 'Parties', id: 'nav-parties', path: 'parties.html', icon: '<path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>' },
            { name: 'Expenses', id: 'nav-expenses', path: 'expenses.html', icon: '<path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>' },
            { name: 'Accounts', id: 'nav-accounts', path: 'accounts.html', icon: '<path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>' },
            { name: 'Labour', id: 'nav-attendance', path: 'attendance.html', icon: '<path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>' }
        ];

        const desktopNav = document.getElementById('desktop-nav');
        const mobileNav = document.getElementById('mobile-nav');
        const currentPath = window.location.pathname.split('/').pop() || 'index.html';

        navItems.forEach(item => {
            const isActive = currentPath === item.path ? 'active' : '';
            const html = `
                <a href="${item.path}" class="nav-item ${isActive}">
                    <svg class="nav-icon" viewBox="0 0 24 24">${item.icon}</svg>
                    <span>${item.name}</span>
                </a>
            `;
            desktopNav.innerHTML += html;
            mobileNav.innerHTML += html;
        });

        // 3. Haptic Feedback Utility
        function hapticVibrate(pattern) {
            if ('vibrate' in navigator) navigator.vibrate(pattern);
        }

        // Add vibration to all nav items on click
        document.querySelectorAll('.nav-item').forEach(el => {
            el.addEventListener('click', () => hapticVibrate(40));
        });

        // 4. PWA Installation Logic
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');
        const btnInstall = document.getElementById('btn-install-app');
        const btnClose = document.getElementById('btn-close-banner');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent Chrome from automatically showing the default prompt
            e.preventDefault();
            // Stash the event so it can be triggered later.
            deferredPrompt = e;
            // Show custom professional banner
            setTimeout(() => {
                installBanner.classList.add('show');
                hapticVibrate([30, 50, 30]); // Notify user it appeared
            }, 2000); // Delay showing for 2 seconds after page load
        });

        btnInstall.addEventListener('click', async () => {
            hapticVibrate(50);
            if (deferredPrompt) {
                // Show the system install prompt
                deferredPrompt.prompt();
                // Wait for the user to respond
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('User accepted the install prompt');
                }
                // Clear prompt and hide banner
                deferredPrompt = null;
                installBanner.classList.remove('show');
            }
        });

        btnClose.addEventListener('click', () => {
            hapticVibrate(30);
            installBanner.classList.remove('show');
        });
    </script>
</body>
</html>
