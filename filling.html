<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Filling Operations - LITHIK BEVERAGE</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a">
    <link rel="apple-touch-icon" href="images/icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --bg-nav: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary-color: #1e40af;
            --accent-color: #0ea5e9;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --border-color: #e2e8f0;
            --input-bg: #f1f5f9;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #020617;
                --bg-surface: #0f172a;
                --bg-nav: #0f172a;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --primary-color: #3b82f6;
                --accent-color: #0ea5e9;
                --border-color: #1e293b;
                --input-bg: #1e293b;
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); height: 100%; width: 100vw; overflow: hidden; }
        *::-webkit-scrollbar { display: none !important; }
        * { -ms-overflow-style: none !important; scrollbar-width: none !important; }

        header, .material-symbols-outlined, .nav-item, .btn-primary { -webkit-user-select: none; user-select: none; }
        .material-symbols-outlined { display: inline-flex; align-items: center; justify-content: center; }

        #app-shell { display: flex; height: 100%; width: 100%; position: absolute; inset: 0; flex-direction: column; overflow: hidden; }
        header { display: flex; align-items: center; justify-content: space-between; background-color: var(--bg-surface); padding: 12px 20px; border-bottom: 1px solid var(--border-color); z-index: 10; flex-shrink: 0; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .company-logo { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; box-shadow: var(--shadow-sm); }
        h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 0.5px; color: var(--primary-color); margin:0; text-transform: uppercase;}

        .layout-container { display: flex; flex: 1; overflow: hidden; min-height: 0; }
        
        nav.sidebar { display: none; width: 260px; background-color: var(--bg-nav); border-right: 1px solid var(--border-color); flex-direction: column; padding: 20px 0; overflow-y: auto; }
        nav.sidebar .nav-item { display: flex; align-items: center; text-decoration: none; color: var(--text-muted); padding: 14px 24px; gap: 16px; font-size: 1rem; font-weight: 500; transition: all 0.2s; cursor: pointer; }
        nav.sidebar .nav-item:hover, nav.sidebar .nav-item.active { background-color: rgba(59, 130, 246, 0.05); color: var(--primary-color); border-right: 3px solid var(--primary-color); }
        
        nav.bottom-nav { display: flex; background-color: var(--bg-nav); border-top: 1px solid var(--border-color); min-height: 65px; height: calc(65px + env(safe-area-inset-bottom)); width: 100%; overflow-x: auto; overflow-y: hidden; scroll-behavior: smooth; padding: 0 10px; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); position: relative; z-index: 100; }
        nav.bottom-nav .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: var(--text-muted); min-width: 72px; padding: 8px 4px; gap: 4px; font-size: 0.75rem; font-weight: 600; transition: all 0.2s; cursor: pointer; }
        nav.bottom-nav .nav-item.active { color: var(--primary-color); }
        .nav-icon { width: 24px; height: 24px; fill: currentColor; }

        .main-scroll-area { flex: 1; overflow-y: auto; padding: 20px; background-color: var(--bg-body); position: relative; }
        .container-inner { max-width: 800px; margin: 0 auto; width: 100%; }

        .top-actions { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; justify-content: flex-end; }
        .btn-fab { background: var(--primary-color); color: white; border: none; width: 48px; height: 48px; border-radius: 12px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: var(--shadow-md); transition: all 0.2s; flex-shrink: 0; }
        .btn-fab:active { transform: scale(0.95); }

        .filling-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
        .filling-card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; box-shadow: var(--shadow-sm); position: relative; }
        .fc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;}
        .fc-company { font-weight: 800; font-size: 1.15rem; color: var(--text-main); display: flex; align-items: center; gap: 6px;}
        .fc-date { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
        
        .fc-row { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 6px;}
        .fc-label { color: var(--text-muted); font-weight: 600;}
        .fc-val { color: var(--text-main); font-weight: 700;}

        .fc-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 12px; margin-top: 12px; }
        .fc-cost { font-size: 1.25rem; font-weight: 800; color: var(--danger-color); }
        .fc-dc { font-size: 0.8rem; font-weight: 700; padding: 4px 10px; border-radius: 6px; background: var(--input-bg); color: var(--primary-color); border: 1px solid var(--border-color); }

        .modal { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background-color: var(--bg-body); z-index: 2000; transition: right 0.3s ease; overflow-y: auto; padding-bottom: 80px; }
        .modal.active { right: 0; }
        .modal-header { display: flex; align-items: center; gap: 15px; padding: 18px 20px; background: var(--bg-surface); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border-color); }
        .close-modal { background: none; border: none; color: var(--text-main); cursor: pointer; display: flex; padding: 8px; border-radius: 50%; margin-left: -8px; }
        .modal-header h2 { margin: 0; font-size: 1.25em; font-weight: 700; }

        .form-group { padding: 20px; max-width: 800px; margin: 0 auto; }
        .input-wrapper { margin-bottom: 20px; }
        .input-wrapper label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.85em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-wrapper input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); font-size: 1rem; font-family: 'Inter', sans-serif; outline: none; transition: all 0.2s ease; }
        .input-wrapper input:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        .row-inputs { display: flex; gap: 16px; }
        .row-inputs > div { flex: 1; }

        .btn-primary { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary-color); color: white; font-size: 1.1em; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: all 0.2s; box-shadow: 0 4px 10px rgba(30, 64, 175, 0.2); }
        .btn-primary:active:not(:disabled) { transform: translateY(2px); box-shadow: none; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .toast-msg { position: fixed; top: 20px; left: 50%; transform: translate(-50%, -20px); color: white; padding: 12px 24px; border-radius: 8px; z-index: 9999; display: none; font-weight: 600; font-size: 0.95em; align-items: center; gap: 10px; opacity: 0; transition: all 0.3s; box-shadow: var(--shadow-lg); }
        .toast-msg.error { background: var(--danger-color); }
        .toast-msg.success { background: var(--success-color); }
        .toast-msg.show { display: flex; opacity: 1; transform: translate(-50%, 0); }

        @media (min-width: 768px) {
            #app-shell { flex-direction: column; }
            .layout-container { flex-direction: row; }
            nav.bottom-nav { display: none; }
            nav.sidebar { display: flex; }
            .filling-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="toast-msg error" id="errorToast"><span class="material-symbols-outlined">error</span><span id="errorToastText">Error</span></div>
    <div class="toast-msg success" id="successToast"><span class="material-symbols-outlined">check_circle</span><span id="successToastText">Success</span></div>

    <div id="app-shell">
        <header>
            <div class="header-left">
                <img src="images/icon.png" alt="Logo" class="company-logo" onerror="this.src='https://via.placeholder.com/40'">
                <h1>FILLING OPERATIONS</h1>
            </div>
        </header>

        <div class="layout-container">
            <nav class="sidebar" id="desktop-nav"></nav>

            <div class="main-scroll-area">
                <div class="container-inner">
                    <div class="top-actions">
                        <button class="btn-fab" onclick="openFillingModal()" title="Log New Filling">
                            <span class="material-symbols-outlined">local_shipping</span>
                        </button>
                    </div>

                    <div class="filling-grid" id="fillingGrid">
                        <!-- Loaded dynamically -->
                    </div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav" id="mobile-nav"></nav>
    </div>

    <!-- Log Filling Modal -->
    <div class="modal" id="modalFilling">
        <div class="modal-header">
            <button class="close-modal" onclick="history.back()"><span class="material-symbols-outlined">arrow_back</span></button>
            <h2>Log Finished Filling</h2>
        </div>
        <div class="form-group">
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px;">This will deduct empty bottles from inventory and add Filled Cases back to stock automatically.</p>
            
            <div class="row-inputs">
                <div class="input-wrapper">
                    <label>Date *</label>
                    <input type="date" id="fDate">
                </div>
                <div class="input-wrapper">
                    <label>DC No *</label>
                    <input type="text" id="fDcNo" placeholder="e.g. 5">
                </div>
            </div>

            <div class="input-wrapper">
                <label>Filling Company *</label>
                <input type="text" id="fCompany" placeholder="e.g. JMS">
            </div>

            <div style="background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; margin-bottom: 20px;">
                <label style="margin-bottom: 12px; color: var(--primary-color);">Filled Cases Received</label>
                <div class="row-inputs">
                    <div class="input-wrapper" style="margin-bottom: 8px;">
                        <label>300ML (Cases)</label>
                        <input type="number" id="f300" placeholder="0" min="0">
                    </div>
                    <div class="input-wrapper" style="margin-bottom: 8px;">
                        <label>500ML (Cases)</label>
                        <input type="number" id="f500" placeholder="0" min="0">
                    </div>
                </div>
                <div class="row-inputs">
                    <div class="input-wrapper" style="margin-bottom: 0;">
                        <label>1L (Cases)</label>
                        <input type="number" id="f1L" placeholder="0" min="0">
                    </div>
                    <div class="input-wrapper" style="margin-bottom: 0;">
                        <label>Rejected Bottles</label>
                        <input type="number" id="fReject" placeholder="0" min="0">
                    </div>
                </div>
            </div>

            <div class="input-wrapper">
                <label>Cost of Filling (₹) *</label>
                <input type="number" id="fCost" placeholder="0" min="0">
            </div>

            <button type="button" class="btn-primary" id="btnSaveFilling">
                <span class="material-symbols-outlined">task_alt</span> Save Log
            </button>
        </div>
    </div>

    <script type="module">
        import { app, db } from './config.js';
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { collection, doc, getDocs, query, orderBy, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        // Navigation Setup (Matches your existing app perfectly)
        const navItems = [
            { name: 'Dashboard', path: 'index.html', icon: '<path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>' },
            { name: 'Billing', path: 'bill.html', icon: '<path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>' },
            { name: 'Production', path: 'production.html', icon: '<path d="M19.36 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.36 8.04A5.994 5.994 0 000 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.64-4.96zM10 17l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>' },
            { name: 'Filling', path: 'filling.html', icon: '<path d="M12 2c-5.33 0-8 2.67-8 4v12c0 1.33 2.67 4 8 4s8-2.67 8-4V6c0-1.33-2.67-4-8-4zm0 2c4.42 0 6 1.5 6 2s-1.58 2-6 2-6-1.5-6-2 1.58-2 6-2z"/>' },
            { name: 'Inventory', path: 'inventory.html', icon: '<path d="M20 2H4c-1.1 0-2 .9-2 2v3.01c0 .72.43 1.34 1 1.69V20c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8.7c.57-.35 1-.97 1-1.69V4c0-1.1-.9-2-2-2zm-5 12H9v-2h6v2zm5-7H4V4h16v3z"/>' },
            { name: 'Purchase', path: 'purchase.html', icon: '<path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>' },
            { name: 'Sales', path: 'sales.html', icon: '<path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/>' },
            { name: 'Parties', path: 'parties.html', icon: '<path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>' },
            { name: 'Expenses', path: 'expenses.html', icon: '<path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>' },
            { name: 'Accounts', path: 'accounts.html', icon: '<path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>' },
            { name: 'Labour', path: 'attendance.html', icon: '<path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>' }
        ];

        const desktopNav = document.getElementById('desktop-nav');
        const mobileNav = document.getElementById('mobile-nav');
        const currentPath = window.location.pathname.split('/').pop() || 'filling.html';

        navItems.forEach(item => {
            const isActive = currentPath === item.path ? 'active' : '';
            const html = `
                <a href="${item.path}" class="nav-item ${isActive}">
                    <svg class="nav-icon" viewBox="0 0 24 24">${item.icon}</svg>
                    <span>${item.name}</span>
                </a>
            `;
            desktopNav.innerHTML += html;
            mobileNav.innerHTML += html;
        });

        window.vibrateApp = function(pattern) { if (navigator.vibrate) navigator.vibrate(pattern); };
        window.showToast = function(msg, type = "success") {
            vibrateApp(type === "error" ? 40 : 20);
            const toast = document.getElementById(type === "error" ? 'errorToast' : 'successToast');
            document.getElementById(type === "error" ? 'errorToastText' : 'successToastText').innerText = msg;
            toast.style.display = 'flex';
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.style.display = 'none', 300); }, 3000);
        };

        window.openModal = function(id) { document.getElementById(id).classList.add('active'); history.pushState({modal: id}, '', `#${id}`); };
        window.addEventListener('popstate', (e) => { document.querySelectorAll('.modal.active').forEach(m => m.classList.remove('active')); });

        const auth = getAuth(app);
        onAuthStateChanged(auth, async (user) => {
            if (user) { 
                document.getElementById('fDate').valueAsDate = new Date();
                loadFillingLogs(); 
            }
            else window.location.replace('login.html');
        });

        window.openFillingModal = function() {
            document.getElementById('fDcNo').value = '';
            document.getElementById('fCompany').value = '';
            document.getElementById('f300').value = '';
            document.getElementById('f500').value = '';
            document.getElementById('f1L').value = '';
            document.getElementById('fReject').value = '';
            document.getElementById('fCost').value = '';
            openModal('modalFilling');
        };

        document.getElementById('btnSaveFilling').addEventListener('click', async () => {
            vibrateApp(30);
            const dateStr = document.getElementById('fDate').value;
            const company = document.getElementById('fCompany').value.trim();
            const dcNo = document.getElementById('fDcNo').value.trim();
            const c300 = parseInt(document.getElementById('f300').value) || 0;
            const c500 = parseInt(document.getElementById('f500').value) || 0;
            const c1L = parseInt(document.getElementById('f1L').value) || 0;
            const reject = parseInt(document.getElementById('fReject').value) || 0;
            const cost = parseFloat(document.getElementById('fCost').value) || 0;

            if(!dateStr || !company || !dcNo || cost <= 0) { showToast("Date, Company, DC No, and Cost are required.", "error"); return; }
            if(c300 === 0 && c500 === 0 && c1L === 0) { showToast("Enter at least one case quantity.", "error"); return; }

            const btn = document.getElementById('btnSaveFilling');
            btn.disabled = true; btn.innerHTML = "Saving...";

            try {
                const payload = {
                    date: dateStr,
                    company,
                    dcNo,
                    qty300: c300,
                    qty500: c500,
                    qty1L: c1L,
                    rejected: reject,
                    cost,
                    createdAt: serverTimestamp()
                };

                const newRef = doc(collection(db, "filling_logs"));
                await setDoc(newRef, payload);
                
                // Advanced implementation: This is where you would also trigger 
                // a Firebase Transaction to alter `inventory` directly.

                showToast("Filling log saved!");
                history.back();
                loadFillingLogs();
            } catch(e) {
                console.error(e);
                showToast("Failed to save log", "error");
            } finally {
                btn.disabled = false; btn.innerHTML = `<span class="material-symbols-outlined">task_alt</span> Save Log`;
            }
        });

        async function loadFillingLogs() {
            const grid = document.getElementById('fillingGrid');
            grid.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-muted);">Loading logs...</div>';
            
            try {
                const q = query(collection(db, "filling_logs"), orderBy("date", "desc"), limit(20));
                const snap = await getDocs(q);
                
                if(snap.empty) {
                    grid.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-muted);">No filling logs found.</div>';
                    return;
                }

                let html = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    const dFormatted = new Date(d.date).toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric'});
                    
                    html += `
                        <div class="filling-card">
                            <div class="fc-header">
                                <div class="fc-company"><span class="material-symbols-outlined">precision_manufacturing</span> ${d.company}</div>
                                <div class="fc-date">${dFormatted}</div>
                            </div>
                            <div style="margin-bottom: 12px;">
                                ${d.qty300 > 0 ? `<div class="fc-row"><span class="fc-label">300ML Cases</span><span class="fc-val">${d.qty300}</span></div>` : ''}
                                ${d.qty500 > 0 ? `<div class="fc-row"><span class="fc-label">500ML Cases</span><span class="fc-val">${d.qty500}</span></div>` : ''}
                                ${d.qty1L > 0 ? `<div class="fc-row"><span class="fc-label">1L Cases</span><span class="fc-val">${d.qty1L}</span></div>` : ''}
                                ${d.rejected > 0 ? `<div class="fc-row" style="color:var(--danger-color);"><span class="fc-label" style="color:var(--danger-color);">Rejected Bottles</span><span class="fc-val">${d.rejected}</span></div>` : ''}
                            </div>
                            <div class="fc-footer">
                                <div class="fc-dc">DC NO: ${d.dcNo}</div>
                                <div class="fc-cost">₹${d.cost.toLocaleString('en-IN')}</div>
                            </div>
                        </div>
                    `;
                });
                grid.innerHTML = html;
            } catch(e) {
                console.error(e);
                grid.innerHTML = '<div style="text-align:center; padding:20px; color:var(--danger-color);">Failed to load logs.</div>';
            }
        }
    </script>
</body>
</html>
